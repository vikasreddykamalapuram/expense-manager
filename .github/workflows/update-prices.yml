name: Update Stock Prices

on:
  schedule:
    # Every 15 min during Indian market hours (9:15 AM - 3:45 PM IST = 3:45 - 10:15 UTC)
    # Weekdays only
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Comma-separated stock symbols (e.g., RELIANCE,TCS,INFY)'
        required: false

permissions:
  contents: write

defaults:
  run:
    working-directory: expense-manager

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch stock prices
        run: |
          if [ -n "${{ github.event.inputs.symbols }}" ]; then
            node scripts/fetch-prices.mjs --symbols "${{ github.event.inputs.symbols }}"
          else
            node scripts/fetch-prices.mjs
          fi

      - name: Update symbols manifest with any new symbols
        run: |
          node -e "
            const fs = require('fs');
            try {
              const prices = JSON.parse(fs.readFileSync('public/prices.json', 'utf8'));
              const manifest = JSON.parse(fs.readFileSync('public/stock-symbols.json', 'utf8'));
              const manifestSet = new Set(manifest.symbols || []);
              let added = 0;
              for (const sym of Object.keys(prices.data || {})) {
                if (!manifestSet.has(sym)) {
                  manifestSet.add(sym);
                  added++;
                }
              }
              if (added > 0) {
                manifest.symbols = [...manifestSet].sort();
                manifest.lastUpdated = new Date().toISOString();
                fs.writeFileSync('public/stock-symbols.json', JSON.stringify(manifest, null, 2) + '\n');
                console.log('Added ' + added + ' new symbols to manifest');
              }
            } catch(e) { console.log('Skipping manifest update:', e.message); }
          "

      - name: Commit updated prices
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add expense-manager/public/prices.json expense-manager/public/stock-symbols.json
          if git diff --cached --quiet; then
            echo "No price changes to commit"
          else
            git commit -m "chore: update stock prices [skip ci]"
            git push
          fi
