<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpenseIQ — Personal Finance Manager</title>
    <!-- GitHub Pages SPA redirect handler: restores path from 404.html query string -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Static links for Google verification bot (hidden once React mounts) -->
    <noscript>
      <p><a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms of Service</a></p>
    </noscript>
    <div id="policy-links" style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:8px;font-size:11px;color:#9ca3af;background:#fff;">
      <a href="privacy.html" style="color:#6b7280;text-decoration:underline;">Privacy Policy</a> ·
      <a href="terms.html" style="color:#6b7280;text-decoration:underline;">Terms of Service</a>
    </div>
    <script>
      // Hide static links once React app renders
      var observer = new MutationObserver(function() {
        if (document.getElementById('root') && document.getElementById('root').children.length > 0) {
          var el = document.getElementById('policy-links');
          if (el) el.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
